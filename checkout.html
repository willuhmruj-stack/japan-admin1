<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน - ร้าน APK</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">⬅️ กลับหน้าร้าน</a>
        
        <div class="checkout-container">
            <h2>💳 ชำระเงิน</h2>
            
            <!-- รายละเอียดสินค้า -->
            <div id="product-summary" class="product-summary">
                กำลังโหลดข้อมูลสินค้า...
            </div>
            
            <!-- ข้อมูลการโอนเงิน -->
            <div class="payment-info">
                <h3>📱 โอนเงินผ่าน TrueMoney Wallet</h3>
                <p>เบอร์วอลเลท: <strong>091-234-5678</strong> (เปลี่ยนเป็นเบอร์คุณ)</p>
                <p>จำนวนเงิน: <strong id="amount-display">0</strong> บาท</p>
                
                <div class="qr-container">
                    <img src="images/truemoney-qr.png" alt="QR Code TrueMoney" id="qr-code">
                    <p class="note">📸 สแกน QR หรือโอนเข้าเบอร์ด้านบน</p>
                </div>
            </div>
            
            <!-- อัปโหลดสลิป -->
            <div class="upload-section">
                <h3>📎 แนบหลักฐานการโอนเงิน</h3>
                <input type="file" id="slip-file" accept="image/*">
                <p id="upload-status"></p>
                
                <button id="confirm-payment-btn" class="btn-confirm">
                    ✅ ยืนยันการชำระเงิน
                </button>
            </div>
            
            <p id="message" class="message"></p>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // ตัวแปรเก็บข้อมูลสินค้าจาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const productName = urlParams.get('name');
        const productPrice = urlParams.get('price');
        
        let slipFile = null;
        
        // ตรวจสอบว่ามีข้อมูลสินค้าหรือไม่
        if (!productId || !productName || !productPrice) {
            document.getElementById('product-summary').innerHTML = 
                '<p style="color:red;">❌ ไม่พบข้อมูลสินค้า กรุณากลับไปเลือกสินค้าใหม่</p>';
            document.getElementById('confirm-payment-btn').disabled = true;
        } else {
            document.getElementById('product-summary').innerHTML = `
                <p><strong>สินค้า:</strong> ${productName}</p>
                <p><strong>ราคา:</strong> ${productPrice} บาท</p>
            `;
            document.getElementById('amount-display').textContent = productPrice;
        }
        
        // ตรวจสอบสถานะล็อกอิน
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
        
        // จัดการอัปโหลดไฟล์
        document.getElementById('slip-file').addEventListener('change', function(e) {
            slipFile = e.target.files[0];
            if (slipFile) {
                document.getElementById('upload-status').innerHTML = 
                    `✅ เลือกไฟล์: ${slipFile.name}`;
            }
        });
        
        // ปุ่มยืนยันการชำระเงิน
        document.getElementById('confirm-payment-btn').addEventListener('click', async function() {
            const user = auth.currentUser;
            const messageEl = document.getElementById('message');
            
            if (!user) {
                messageEl.innerHTML = '<span style="color:red;">❌ กรุณาล็อกอินก่อน</span>';
                return;
            }
            
            if (!slipFile) {
                messageEl.innerHTML = '<span style="color:red;">❌ กรุณาเลือกไฟล์สลิป</span>';
                return;
            }
            
            // แสดงสถานะกำลังดำเนินการ
            messageEl.innerHTML = '<span style="color:blue;">⏳ กำลังอัปโหลดสลิปและบันทึกออเดอร์...</span>';
            
            try {
                // 1. อัปโหลดสลิปไปยัง Firebase Storage
                const storageRef = firebase.storage().ref();
                const slipRef = storageRef.child(`slips/${user.uid}_${Date.now()}_${slipFile.name}`);
                const uploadTask = await slipRef.put(slipFile);
                const slipUrl = await uploadTask.ref.getDownloadURL();
                
                // 2. บันทึกออเดอร์ลง Firestore
                const orderData = {
                    productId: productId,
                    productName: productName,
                    price: parseInt(productPrice),
                    customerEmail: user.email,
                    customerUid: user.uid,
                    status: 'pending',
                    slipUrl: slipUrl,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const orderRef = await db.collection('orders').add(orderData);
                
                messageEl.innerHTML = '<span style="color:green;">✅ อัปโหลดสลิปเรียบร้อย! รอแอดมินตรวจสอบ</span>';
                
                // ไปหน้า dashboard หลังจาก 2 วินาที
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                messageEl.innerHTML = `<span style="color:red;">❌ เกิดข้อผิดพลาด: ${error.message}</span>`;
            }
        });
    </script>
    
    <style>
        .checkout-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .product-summary {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .payment-info {
            text-align: center;
            margin-bottom: 30px;
        }
        .qr-container {
            margin: 20px 0;
        }
        .qr-container img {
            max-width: 200px;
            border-radius: 10px;
            border: 2px solid #00d4ff;
        }
        .upload-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }
        .btn-confirm {
            background: #06C755;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 0 #008c3a;
        }
        .btn-confirm:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #008c3a;
        }
        .message {
            margin-top: 20px;
            text-align: center;
        }
        .note {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</body>
</html>
