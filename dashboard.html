<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด - ร้าน APK</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h1>📊 แดชบอร์ด</h1>
            <div class="user-info-header">
                <span id="user-email-display"></span>
                <button id="logout-btn" class="btn-logout">ออกจากระบบ</button>
            </div>
        </div>
        
        <a href="index.html" class="back-link">⬅️ กลับหน้าร้าน</a>
        
        <div class="dashboard-content">
            <h2>📦 ประวัติการสั่งซื้อของคุณ</h2>
            <div id="orders-list" class="orders-list">
                <p>กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // ตรวจสอบสถานะล็อกอิน
        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // แสดงอีเมลผู้ใช้
            document.getElementById('user-email-display').textContent = user.email;
            
            // โหลดรายการออเดอร์
            loadOrders(user.email);
        });
        
        // ปุ่มออกจากระบบ
        document.getElementById('logout-btn').addEventListener('click', function() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        });
        
        // ฟังก์ชันโหลดออเดอร์
        function loadOrders(email) {
            const ordersContainer = document.getElementById('orders-list');
            
            db.collection('orders')
                .where('customerEmail', '==', email)
                .orderBy('createdAt', 'desc')
                .get()
                .then(querySnapshot => {
                    if (querySnapshot.empty) {
                        ordersContainer.innerHTML = '<p style="color: #aaa; text-align: center;">🔍 ยังไม่มีประวัติการสั่งซื้อ</p>';
                        return;
                    }
                    
                    let html = '';
                    querySnapshot.forEach(doc => {
                        const order = doc.data();
                        const orderId = doc.id;
                        const statusText = getStatusText(order.status);
                        const statusColor = getStatusColor(order.status);
                        const date = order.createdAt ? order.createdAt.toDate().toLocaleDateString('th-TH') : 'ไม่ระบุ';
                        
                        html += `
                            <div class="order-card">
                                <div class="order-header">
                                    <span class="order-id">รหัสออเดอร์: ${orderId.slice(0,8)}</span>
                                    <span class="order-date">📅 ${date}</span>
                                </div>
                                <div class="order-body">
                                    <p><strong>สินค้า:</strong> ${order.productName || 'ไม่ระบุ'}</p>
                                    <p><strong>ราคา:</strong> ${order.price || 0} บาท</p>
                                    <p><strong>สถานะ:</strong> <span style="color: ${statusColor};">${statusText}</span></p>
                                </div>
                                <div class="order-footer">
                                    ${order.status === 'approved' ? 
                                        `<a href="download.html?orderId=${orderId}" class="btn-download">⬇️ ดาวน์โหลด APK</a>` : 
                                        `<span class="waiting-badge">⏳ รอตรวจสอบ</span>`
                                    }
                                </div>
                            </div>
                        `;
                    });
                    
                    ordersContainer.innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading orders:', error);
                    ordersContainer.innerHTML = '<p style="color: red;">❌ ไม่สามารถโหลดข้อมูลได้</p>';
                });
        }
        
        // ฟังก์ชันแปลงสถานะเป็นข้อความ
        function getStatusText(status) {
            switch(status) {
                case 'pending': return 'รอตรวจสอบ';
                case 'approved': return 'ยืนยันแล้ว';
                case 'rejected': return 'ถูกปฏิเสธ';
                default: return status;
            }
        }
        
        // ฟังก์ชันสีของสถานะ
        function getStatusColor(status) {
            switch(status) {
                case 'pending': return '#ffc107';
                case 'approved': return '#06C755';
                case 'rejected': return '#dc3545';
                default: return '#aaa';
            }
        }
    </script>
    
    <style>
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .dashboard-header h1 {
            color: #00d4ff;
            margin: 0;
        }
        .user-info-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .dashboard-content {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }
        .orders-list {
            margin-top: 20px;
        }
        .order-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #00d4ff;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #aaa;
            font-size: 14px;
        }
        .order-id {
            font-family: monospace;
            background: #1e1e3a;
            padding: 4px 8px;
            border-radius: 5px;
        }
        .order-body p {
            margin: 8px 0;
        }
        .order-footer {
            margin-top: 15px;
            text-align: right;
        }
        .btn-download {
            background: #06C755;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .waiting-badge {
            background: #333;
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffc107;
        }
        @media (max-width: 600px) {
            .dashboard-header {
                flex-direction: column;
                align-items: start;
                gap: 10px;
            }
        }
    </style>
</body>
</html>
