<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการออเดอร์ - แอดมิน</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>📋 จัดการออเดอร์</h1>
            <div>
                <a href="products.html" class="btn">📦 สินค้า</a>
                <button id="logout-btn" class="btn-logout">ออกจากระบบ</button>
            </div>
        </div>
        
        <div class="filter-bar">
            <select id="status-filter">
                <option value="all">ทั้งหมด</option>
                <option value="pending">รอตรวจสอบ</option>
                <option value="approved">ยืนยันแล้ว</option>
                <option value="rejected">ปฏิเสธ</option>
            </select>
        </div>

        <div id="orders-table-container">
            <p>กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <script src="../js/firebase.js"></script>
    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentOrders = [];

        // ตรวจสอบแอดมิน
        auth.onAuthStateChanged(async user => {
            if (!user) {
                window.location.href = 'admin-login.html';
                return;
            }
            const adminDoc = await db.collection('admins').doc(user.email).get();
            if (!adminDoc.exists) {
                await auth.signOut();
                window.location.href = 'admin-login.html';
                return;
            }
            loadOrders();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'admin-login.html');
        });

        document.getElementById('status-filter').addEventListener('change', (e) => {
            const filterValue = e.target.value;
            if (filterValue === 'all') {
                renderOrdersTable(currentOrders);
            } else {
                const filtered = currentOrders.filter(o => o.status === filterValue);
                renderOrdersTable(filtered);
            }
        });

        async function loadOrders() {
            const container = document.getElementById('orders-table-container');
            try {
                const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
                currentOrders = [];
                snapshot.forEach(doc => {
                    currentOrders.push({ id: doc.id, ...doc.data() });
                });
                renderOrdersTable(currentOrders);
            } catch (error) {
                container.innerHTML = '<p style="color:red;">❌ โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        function renderOrdersTable(orders) {
            const container = document.getElementById('orders-table-container');
            if (orders.length === 0) {
                container.innerHTML = '<p>ไม่มีออเดอร์</p>';
                return;
            }

            let html = `
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>วันที่</th>
                            <th>ลูกค้า</th>
                            <th>สินค้า</th>
                            <th>ราคา</th>
                            <th>สลิป</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            orders.forEach(order => {
                const date = order.createdAt ? order.createdAt.toDate().toLocaleString('th-TH') : '-';
                const slipLink = order.slipUrl ? `<a href="${order.slipUrl}" target="_blank">ดูสลิป</a>` : 'ไม่มี';
                const statusText = getStatusText(order.status);
                
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${order.customerEmail}</td>
                        <td>${order.productName}</td>
                        <td>${order.price}</td>
                        <td>${slipLink}</td>
                        <td style="color: ${getStatusColor(order.status)};">${statusText}</td>
                        <td>
                            ${order.status === 'pending' ? `
                                <button class="btn-approve" onclick="updateOrderStatus('${order.id}', 'approved')">✅ ยืนยัน</button>
                                <button class="btn-reject" onclick="updateOrderStatus('${order.id}', 'rejected')">❌ ปฏิเสธ</button>
                            ` : '-'}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        window.updateOrderStatus = async (orderId, newStatus) => {
            try {
                await db.collection('orders').doc(orderId).update({ status: newStatus });
                alert(`อัปเดตสถานะเป็น ${getStatusText(newStatus)}`);
                loadOrders();
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ' + error.message);
            }
        };

        function getStatusText(status) {
            const map = { pending: 'รอตรวจสอบ', approved: 'ยืนยันแล้ว', rejected: 'ปฏิเสธ' };
            return map[status] || status;
        }

        function getStatusColor(status) {
            const map = { pending: '#ffc107', approved: '#06C755', rejected: '#dc3545' };
            return map[status] || '#aaa';
        }
    </script>
    <style>
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .filter-bar { margin-bottom: 20px; }
        .btn-approve { background: #06C755; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .btn-reject { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</body>
</html>
