<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ล็อกอินแอดมิน - ร้าน APK</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>🛡️ ล็อกอินแอดมิน</h2>
            <p>ใช้บัญชี Google ที่ได้รับอนุญาตเท่านั้น</p>
            <button id="google-login-btn" class="google-btn">🟢 ล็อกอินด้วย Google</button>
            <p id="error-message" style="color: red;"></p>
            <a href="../index.html">⬅️ กลับหน้าร้าน</a>
        </div>
    </div>

    <script src="../js/firebase.js"></script>
    <script>
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // ตรวจสอบว่าเป็นแอดมินหรือไม่
                const adminDoc = await db.collection('admins').doc(user.email).get();
                if (adminDoc.exists) {
                    window.location.href = 'orders.html';
                } else {
                    await auth.signOut();
                    document.getElementById('error-message').innerText = '❌ คุณไม่มีสิทธิ์เป็นแอดมิน';
                }
            } catch (error) {
                document.getElementById('error-message').innerText = '❌ ล็อกอินไม่สำเร็จ: ' + error.message;
            }
        });

        // ถ้าล็อกอินอยู่แล้วให้เช็คสิทธิ์
        auth.onAuthStateChanged(async user => {
            if (user) {
                const adminDoc = await db.collection('admins').doc(user.email).get();
                if (adminDoc.exists) {
                    window.location.href = 'orders.html';
                } else {
                    await auth.signOut();
                }
            }
        });
    </script>
</body>
</html>
