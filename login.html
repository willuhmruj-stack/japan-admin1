<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ล็อกอิน - ร้าน APK</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>🔐 เข้าสู่ระบบ</h2>
            <p>ใช้บัญชี Google เพื่อเข้าใช้งาน</p>
            
            <button id="google-login-btn" class="google-btn">
                🟢 ล็อกอินด้วย Google
            </button>
            
            <p id="error-message" style="color: red;"></p>
            
            <a href="index.html">⬅️ กลับหน้าร้าน</a>
        </div>
    </div>

    <!-- เรียกใช้ Firebase Config และ Auth -->
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // รอให้ Firebase พร้อม
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('google-login-btn');
            const errorMsg = document.getElementById('error-message');
            
            // ตรวจสอบว่ามี auth object หรือยัง
            if (typeof auth === 'undefined') {
                errorMsg.innerText = '❌ ระบบยังไม่พร้อม กรุณาลองใหม่';
                return;
            }
            
            // ตรวจสอบว่าผู้ใช้ล็อกอินอยู่แล้วหรือไม่
            auth.onAuthStateChanged(user => {
                if (user) {
                    // ถ้าล็อกอินแล้ว ให้กลับไปหน้า index.html
                    window.location.href = 'index.html';
                }
            });
            
            // เมื่อกดปุ่มล็อกอิน
            loginBtn.addEventListener('click', function() {
                const provider = new firebase.auth.GoogleAuthProvider();
                
                auth.signInWithPopup(provider)
                    .then((result) => {
                        // ล็อกอินสำเร็จ
                        console.log('✅ ล็อกอินสำเร็จ:', result.user.displayName);
                        window.location.href = 'index.html';
                    })
                    .catch((error) => {
                        // แสดงข้อผิดพลาด
                        console.error('❌ Login error:', error);
                        errorMsg.innerText = '❌ ล็อกอินไม่สำเร็จ: ' + error.message;
                    });
            });
        });
    </script>
</body>
</html>
