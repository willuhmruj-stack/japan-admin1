<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ล็อกอิน · รุจ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- พื้นหลังแอนิเมชัน -->
        <div class="bg-animation">
            <div class="gradient-orb orb-1"></div>
            <div class="gradient-orb orb-2"></div>
        </div>
        
        <div class="login-box">
            <!-- ไอคอนล็อก -->
            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
                    <path d="M12 2C8.13 2 5 5.13 5 9v3c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4V9c0-3.87-3.13-7-7-7z"/>
                    <path d="M12 17v4M8 21h8"/>
                </svg>
            </div>
            
            <div id="auth-container">
                <!-- JavaScript จะ render ที่นี่ -->
            </div>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script>
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        const container = document.getElementById('auth-container');
        
        // หน้า login (ยังไม่ล็อกอิน)
        function renderLogin() {
            container.innerHTML = `
                <h2>ยินดีต้อนรับ</h2>
                <p>ลงชื่อเข้าใช้เพื่อดำเนินการต่อ</p>
                <button id="google-login-btn" class="google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    ล็อกอินด้วย Google
                </button>
                <p id="error-message"></p>
                <a href="index.html" class="back-link">⬅️ กลับหน้าแนะนำตัว</a>
            `;
            
            document.getElementById('google-login-btn').addEventListener('click', () => {
                auth.signInWithPopup(provider)
                    .catch(error => {
                        document.getElementById('error-message').innerText = '❌ ' + error.message;
                    });
            });
        }
        
        // หน้าหลังล็อกอินสำเร็จ
        function renderProfile(user) {
            container.innerHTML = `
                <h2>✅ ล็อกอินสำเร็จ</h2>
                <img src="${user.photoURL}" class="profile-image" alt="Profile">
                <div class="user-name">${user.displayName}</div>
                <div class="user-email">${user.email}</div>
                
                <button id="logout-btn" class="logout-btn">ออกจากระบบ</button>
                <button id="home-btn" class="home-btn">🏠 ไปหน้าหลัก</button>
                <button id="play-btn" class="play-btn">🎮 เล่นเว็บนี้ครับ</button>
            `;
            
            document.getElementById('logout-btn').addEventListener('click', () => {
                auth.signOut();
            });
            
            document.getElementById('home-btn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            
            document.getElementById('play-btn').addEventListener('click', () => {
                // 👇 เปลี่ยนเป็นหน้าที่คุณต้องการให้ปุ่มนี้ไป
                window.location.href = 'play.html';
            });
        }
        
        // เช็คสถานะล็อกอิน
        auth.onAuthStateChanged(user => {
            if (user) {
                renderProfile(user);
            } else {
                renderLogin();
            }
        });
    </script>
    
    <style>
        /* CSS เฉพาะปุ่มเพิ่มเติม (รวมกับ style.css ก็ได้) */
        .home-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 25px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
        }
        
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-2px);
        }
        
        .play-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 25px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        
        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #888;
        }
    </style>
</body>
</html>
