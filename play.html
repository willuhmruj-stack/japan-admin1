            border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px; color: #ccc;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        .btn {
            flex: 1; padding: 14px 18px; border-radius: 60px;
            font-weight: 500; font-size: 15px; cursor: pointer;
            transition: all 0.3s; border: none;
            font-family: 'Prompt', sans-serif; min-width: 120px;

// ── Helpers ───────────────────────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function showToast(msg, ms = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
}

// ── Screens ───────────────────────────────────────────────────────────────
function renderStart() {
    progSec.style.display = 'none';
    content.innerHTML = `
        <div class="start-box">
            <div class="start-icon">🦊🐺✨</div>
            <h2 style="font-size:22px;margin-bottom:10px;">ค้นพบตัวตนที่ซ่อนอยู่</h2>

            </div>
        </div>`;
}

window.startGame = function() {
    selectedQ = shuffle(questionBank).slice(0, 30);
    current   = 0;
    scores    = {};
    charKeys.forEach(k => scores[k] = 0);
    progSec.style.display = 'block';
    renderQuestion();
};

function renderQuestion() {
    const q       = selectedQ[current];
    const percent = ((current + 1) / 30) * 100;
    progBar.style.width  = percent + '%';
    qCounter.textContent = `ข้อ ${current + 1} / 30`;

    content.innerHTML = `
        <div class="question-text">${q.text}</div>
        <div class="options-container">
            ${q.opts.map((opt, i) => `
                <button class="option-btn" onclick="selectAnswer(${i})">
                    ${q.icons[i]} ${opt}
                </button>`).join('')}
        </div>`;
}

window.selectAnswer = function(i) {
    const q = selectedQ[current];
    charKeys.forEach((k, idx) => { scores[k] += q.w[i][idx]; });
    current++;
    if (current < 30) renderQuestion();
    else showResult();
};

// ── Result ────────────────────────────────────────────────────────────────
async function showResult() {
    progSec.style.display = 'none';

    const topKey  = charKeys.reduce((a, b) => scores[a] >= scores[b] ? a : b);
    const topChar = characters.find(c => c.id === topKey);
    const maxScore = Math.max(...charKeys.map(k => scores[k]), 1);

    // บันทึก Firestore
    if (db) {
        try {
            await db.collection('gameStats').add({
                character: topKey,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { /* silent */ }
    }

    // score bars top 4
    const barRows = [...charKeys]
        .map(k => ({ ...characters.find(c => c.id === k), score: scores[k] }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 4)
        .map(c => {
            const pct = Math.round((c.score / maxScore) * 100);
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;">
                <span style="font-size:13px;min-width:116px;color:rgba(255,255,255,0.75);">${c.emoji} ${c.name}</span>
                <div style="flex:1;height:7px;border-radius:99px;background:rgba(255,255,255,0.07);">
                    <div style="height:100%;border-radius:99px;background:${c.color};width:${pct}%;"></div>
                </div>
                <span style="font-size:12px;color:rgba(255,255,255,0.4);min-width:30px;text-align:right;">${pct}%</span>
            </div>`;
        }).join('');

    // ใช้ data-attribute เก็บ charId เพื่อหลีกเลี่ยงปัญหา apostrophe ใน onclick
    content.innerHTML = `
        <div class="result-box" id="result-content">
            <div class="result-emoji">${topChar.emoji}</div>
            <div class="result-title" style="color:${topChar.color};">${topChar.name}</div>
            <div class="result-desc">${topChar.desc}</div>
            <div style="text-align:left;margin:20px 0;">
                <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:12px;text-align:center;">คะแนนของคุณ</div>
                ${barRows}
            </div>
            <div style="background:rgba(255,255,255,0.04);border-radius:20px;padding:16px;margin:16px 0;">
                <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:10px;">สถิติผู้เล่นทั้งหมด</div>
                <div id="stats-area" class="result-stats">
                    <div style="color:#888;font-size:13px;">กำลังโหลด...</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary"   onclick="startGame()">🔄 เล่นอีกครั้ง</button>
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 หน้าหลัก</button>
                <button class="btn btn-secondary" id="share-btn">📤 แชร์</button>
                <button class="btn btn-secondary" onclick="saveAsImage()">📸 บันทึกรูป</button>
            </div>
        </div>`;

    // ผูก event share แบบปลอดภัย ไม่ใช้ inline onclick
    document.getElementById('share-btn').addEventListener('click', function() {
        doShare(topKey, topChar.name);
    });

    // โหลดสถิติ
    const statsEl = document.getElementById('stats-area');
    if (db) {
        try {
            const snap  = await db.collection('gameStats').get();
            const count = {};
            charKeys.forEach(k => count[k] = 0);
            snap.forEach(doc => { const c = doc.data().character; if (count[c] !== undefined) count[c]++; });
            const total = snap.size || 1;
            statsEl.innerHTML = characters.map(c => {
                const pct = Math.round((count[c.id] / total) * 100);
                return `<div class="char-badge" style="border-color:${c.color}30;background:${c.color}12;">
                    ${c.emoji} ${c.name}: <strong>${pct}%</strong>
                </div>`;
            }).join('');
        } catch(e) {
            statsEl.innerHTML = '<div style="color:#888;font-size:13px;">ไม่สามารถโหลดสถิติได้</div>';
        }
    } else {
        statsEl.innerHTML = '<div style="color:#888;font-size:13px;">ไม่ได้เชื่อมต่อ Firebase</div>';
    }
}

// ── Share — แก้บัคหลัก ───────────────────────────────────────────────────
function doShare(charId, charName) {
    const url  = location.origin + location.pathname + '?result=' + encodeURIComponent(charId);
    const text = 'ฉันคือ ' + charName + '! มาลองเล่นกัน 🦊🐺\n' + url;

    if (navigator.share) {
        navigator.share({ title: 'ผลลัพธ์ของฉัน', text: text, url: url })
            .catch(function() { fallbackCopy(url); });
    } else {
        fallbackCopy(url);
    }
}

function fallbackCopy(url) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url)
            .then(function() { showToast('✅ คัดลอกลิงก์แล้ว!'); })
            .catch(function() { legacyCopy(url); });
    } else {
        legacyCopy(url);
    }
}

function legacyCopy(url) {
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
        document.execCommand('copy');
        showToast('✅ คัดลอกลิงก์แล้ว!');
    } catch(e) {
        prompt('คัดลอกลิงก์นี้:', url);
    }
    document.body.removeChild(ta);
}

// ── Save image ────────────────────────────────────────────────────────────
window.saveAsImage = function() {
    var el = document.getElementById('result-content');
    if (!el) return;
    showToast('⏳ กำลังสร้างรูป...');
    html2canvas(el, { scale: 2, backgroundColor: '#1a1a2e', useCORS: true })
        .then(function(canvas) {
            var link    = document.createElement('a');
            link.download = 'my-character.png';
            link.href     = canvas.toDataURL('image/png');
            link.click();
            showToast('✅ บันทึกรูปแล้ว!');
        })
        .catch(function() { showToast('❌ เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'); });
};

// ── URL param: ผลลัพธ์จากลิงก์แชร์ ──────────────────────────────────────
window.onload = function() {
    var params = new URLSearchParams(location.search);
    var shared = params.get('result');
    if (shared) {
        var char = characters.find(function(c) { return c.id === shared; });
        if (char) {
            progSec.style.display = 'none';
            content.innerHTML = `
                <div class="result-box">
                    <div class="result-emoji">${char.emoji}</div>
                    <div class="result-title" style="color:${char.color};">${char.name}</div>
                    <div class="result-desc">${char.desc}</div>
                    <p style="color:#888;font-size:14px;margin-bottom:24px;">เพื่อนของคุณแชร์ผลลัพธ์นี้มา!</p>
                    <div class="btn-group" style="justify-content:center;">
                        <button class="btn btn-primary"   onclick="window.location.href=location.pathname">🎮 ลองเล่นด้วยตัวเอง</button>
                        <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 หน้าหลัก</button>
                    </div>
                </div>`;
            return;
        }
    }
    renderStart();
};
</script>
</body>
</html>
