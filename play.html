<html lang="th">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

    <style>
        :root {
            --bg0:    #0d0d0f;
            --bg1:    #131316;
            --bg2:    #1a1a1f;
            --bg3:    #222228;
            --border: rgba(255,255,255,0.07);
            --border2:rgba(255,255,255,0.12);
            --text:   #e8e8ec;
            --muted:  #6b6b78;
            --accent: #c8c8d4;
            --silver: #a0a0b0;
            --glow:   rgba(180,180,210,0.12);
            --shine:  rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg0);
            min-height: 100vh;
            color: var(--text);
            padding: 24px 16px 60px;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 15% 10%, rgba(120,120,160,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(100,100,140,0.05) 0%, transparent 55%);
        }

        .game-container {
            max-width: 650px;
            margin: 0 auto;
            position: relative; z-index: 1;
        }

        /* ── Header ── */
        .game-header { text-align: center; margin-bottom: 30px; }

        .game-title {
            font-size: 32px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #d0d0e0 0%, #888899 50%, #c0c0d0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .game-subtitle {
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        /* ── Progress ── */
        #progress-section { margin-bottom: 18px; }

        .prog-row {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px;
        }
        .prog-label { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

        .progress-container {
            height: 3px; border-radius: 99px;
            background: rgba(255,255,255,0.06);
            overflow: hidden;
        }
        .progress-bar {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #555566, #9999bb, #555566);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            width: 0%; transition: width 0.35s ease;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── Card ── */
        .game-card {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.04) inset,
                0 24px 48px rgba(0,0,0,0.5);
            animation: cardIn 0.3s ease forwards;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ── Start screen ── */
        .start-box { text-align: center; padding: 10px 0; }
        .start-icon {
            font-size: 64px; margin-bottom: 18px; display: block;
            filter: grayscale(0.3);
        }
        .start-title {
            font-size: 20px; font-weight: 600;
            color: var(--accent); margin-bottom: 10px;
        }
        .start-desc {
            color: var(--muted); font-size: 14px;
            line-height: 1.7; margin-bottom: 28px;
        }

        /* ── Question ── */
        .question-counter {
            font-size: 11px; color: var(--muted);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 20px; text-align: right;
        }
        .question-text {
            font-size: 20px; font-weight: 500;
            line-height: 1.5; margin-bottom: 28px;
            color: var(--text);
        }
        .options-container { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: 15px 18px; border-radius: 14px;
            color: var(--silver); font-size: 15px; text-align: left;
            cursor: pointer; transition: all 0.2s ease;
            font-family: 'Prompt', sans-serif;
            display: flex; align-items: center; gap: 10px;
        }
        .option-btn:hover {
            background: var(--bg3);
            border-color: var(--border2);
            color: var(--text);
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .option-btn:active { transform: scale(0.98); }
        .opt-icon { font-size: 18px; flex-shrink: 0; }

        /* ── Result ── */
        .result-box { text-align: center; }
        .result-emoji-wrap {
            display: inline-flex; align-items: center; justify-content: center;
            width: 110px; height: 110px; border-radius: 50%;
            background: var(--bg2);
            border: 1px solid var(--border2);
            font-size: 60px; margin-bottom: 20px;
            box-shadow:
                0 0 0 8px rgba(255,255,255,0.02),
                0 0 40px rgba(150,150,200,0.08);
            animation: popIn 0.5s cubic-bezier(.4,0,.2,1) forwards;
        }
        @keyframes popIn {
            0%  { opacity:0; transform:scale(0.6); }
            70% { transform:scale(1.06); }
            100%{ opacity:1; transform:scale(1); }
        }
        .result-title {
            font-size: 36px; font-weight: 700;
            margin-bottom: 12px; letter-spacing: -0.5px;
        }
        .result-desc {
            color: var(--silver); font-size: 16px;
            line-height: 1.65; margin-bottom: 24px;
            padding: 0 8px;
        }

        /* score bars */
        .score-section {
            text-align: left; margin: 20px 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 18px;
        }
        .score-section-label {
            font-size: 11px; color: var(--muted);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 14px; text-align: center;
        }
        .score-row {
            display: flex; align-items: center;
            gap: 10px; margin-bottom: 10px;
        }
        .score-row:last-child { margin-bottom: 0; }
        .score-row-name {
            font-size: 12px; min-width: 110px;
            color: rgba(255,255,255,0.65);
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis;
        }
        .score-track {
            flex: 1; height: 5px; border-radius: 99px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .score-fill {
            height: 100%; border-radius: 99px;
            transition: width 1s ease;
        }
        .score-pct {
            font-size: 11px; color: var(--muted);
            min-width: 32px; text-align: right;
        }

        /* global stats */
        .stats-section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 16px;
            margin: 14px 0;
        }
        .stats-label {
            font-size: 11px; color: var(--muted);
            letter-spacing: 1px; text-transform: uppercase;
            margin-bottom: 12px; text-align: center;
        }
        .result-stats {
            display: flex; flex-wrap: wrap;
            gap: 8px; justify-content: center;
        }
        .char-badge {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 99px; padding: 5px 12px;
            font-size: 12px; color: var(--silver);
        }

        /* ── Buttons ── */
        .btn-group {
            display: flex; gap: 10px;
            margin-top: 24px; flex-wrap: wrap;
        }
        .btn {
            flex: 1; padding: 14px 18px; border-radius: 12px;
            font-weight: 500; font-size: 14px; cursor: pointer;
            transition: all 0.2s ease; border: none;
            font-family: 'Prompt', sans-serif; min-width: 110px;
            letter-spacing: 0.2px;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #3a3a4a, #555568);
            color: #e0e0f0;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4),
                        0 1px 0 rgba(255,255,255,0.07) inset;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #444458, #6666 7a);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .btn-secondary {
            background: var(--bg2);
            color: var(--silver);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--bg3);
            border-color: var(--border2);
            color: var(--text);
            transform: translateY(-1px);
        }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 99px; padding: 11px 22px;
            font-family: 'Prompt', sans-serif;
            font-size: 13px; color: var(--accent);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0; z-index: 9999; pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ── Divider ── */
        .divider {
            height: 1px; background: var(--border);
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .game-card { padding: 26px 20px; border-radius: 20px; }
            .game-title { font-size: 26px; }
            .question-text { font-size: 17px; }
            .option-btn { font-size: 14px; padding: 13px 15px; }
            .result-title { font-size: 28px; }
            .btn { font-size: 13px; padding: 12px 14px; min-width: 95px; }
        }
    </style>
</head>

};

function renderQuestion() {
    const q       = selectedQ[current];
    const percent = ((current + 1) / 30) * 100;
    progBar.style.width  = percent + '%';
    qCounter.textContent = `${current + 1} / 30`;

    content.innerHTML = `
        <div class="question-text">${q.text}</div>
        <div class="options-container">
            ${q.opts.map((opt, i) => `
                <button class="option-btn" onclick="selectAnswer(${i})">
                    <span class="opt-icon">${q.icons[i]}</span>${opt}
                </button>`).join('')}
        </div>`;
}

window.selectAnswer = function(i) {
    const q = selectedQ[current];
    charKeys.forEach((k, idx) => { scores[k] += q.w[i][idx]; });
    current++;
    if (current < 30) renderQuestion();
    else showResult();
};

// ── Result ────────────────────────────────────────────────────────────────
async function showResult() {
    progSec.style.display = 'none';

    const topKey   = charKeys.reduce((a, b) => scores[a] >= scores[b] ? a : b);
    const topChar  = characters.find(c => c.id === topKey);
    const maxScore = Math.max(...charKeys.map(k => scores[k]), 1);

    if (db) {
        try {
            await db.collection('gameStats').add({
                character: topKey,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { /* silent */ }
    }

    const barRows = [...charKeys]
        .map(k => ({ ...characters.find(c => c.id === k), score: scores[k] }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 4)
        .map(c => {
            const pct = Math.round((c.score / maxScore) * 100);
            return `<div class="score-row">
                <span class="score-row-name">${c.emoji} ${c.name}</span>
                <div class="score-track">
                    <div class="score-fill" style="background:${c.bar};width:${pct}%;"></div>
                </div>
                <span class="score-pct">${pct}%</span>
            </div>`;
        }).join('');

    content.innerHTML = `
        <div class="result-box" id="result-content">
            <div class="result-emoji-wrap">${topChar.emoji}</div>
            <div class="result-title" style="color:${topChar.color};">${topChar.name}</div>
            <div class="result-desc">${topChar.desc}</div>

            <div class="score-section">
                <div class="score-section-label">คะแนนของคุณ</div>
                ${barRows}
            </div>

            <div class="stats-section">
                <div class="stats-label">สถิติผู้เล่นทั้งหมด</div>
                <div id="stats-area" class="result-stats">
                    <div style="color:var(--muted);font-size:13px;">กำลังโหลด...</div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary"   onclick="startGame()">เล่นอีกครั้ง</button>
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">หน้าหลัก</button>
                <button class="btn btn-secondary" id="share-btn">แชร์</button>
                <button class="btn btn-secondary" onclick="saveAsImage()">บันทึกรูป</button>
            </div>
        </div>`;

    document.getElementById('share-btn').addEventListener('click', function() {
        doShare(topKey, topChar.name);
    });

    // โหลดสถิติ
    const statsEl = document.getElementById('stats-area');
    if (db) {
        try {
            const snap  = await db.collection('gameStats').get();
            const count = {};
            charKeys.forEach(k => count[k] = 0);
            snap.forEach(doc => { const c = doc.data().character; if (count[c] !== undefined) count[c]++; });
            const total = snap.size || 1;
            statsEl.innerHTML = characters.map(c => {
                const pct = Math.round((count[c.id] / total) * 100);
                return `<div class="char-badge" style="border-color:${c.color}40;">
                    ${c.emoji} ${c.name} ${pct}%
                </div>`;
            }).join('');
        } catch(e) {
            statsEl.innerHTML = '<div style="color:var(--muted);font-size:13px;">ไม่สามารถโหลดสถิติได้</div>';
        }
    } else {
        statsEl.innerHTML = '<div style="color:var(--muted);font-size:13px;">ไม่ได้เชื่อมต่อ Firebase</div>';
    }
}

// ── Share (3-layer fallback) ───────────────────────────────────────────────
function doShare(charId, charName) {
    const url  = location.origin + location.pathname + '?result=' + encodeURIComponent(charId);
    const text = 'ฉันคือ ' + charName + '! มาลองเล่นกัน 🦊🐺\n' + url;
    if (navigator.share) {
        navigator.share({ title: 'ผลลัพธ์ของฉัน', text: text, url: url })
            .catch(function() { fallbackCopy(url); });
    } else { fallbackCopy(url); }
}
function fallbackCopy(url) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url)
            .then(function() { showToast('คัดลอกลิงก์แล้ว'); })
            .catch(function() { legacyCopy(url); });
    } else { legacyCopy(url); }
}
function legacyCopy(url) {
    var ta = document.createElement('textarea');
    ta.value = url;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast('คัดลอกลิงก์แล้ว'); }
    catch(e) { prompt('คัดลอกลิงก์นี้:', url); }
    document.body.removeChild(ta);
}

// ── Save image ────────────────────────────────────────────────────────────
window.saveAsImage = function() {
    var el = document.getElementById('result-content');
    if (!el) return;
    showToast('กำลังสร้างรูป...');
    html2canvas(el, { scale: 2, backgroundColor: '#131316', useCORS: true })
        .then(function(canvas) {
            var link = document.createElement('a');
            link.download = 'my-character.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('บันทึกรูปแล้ว');
        })
        .catch(function() { showToast('เกิดข้อผิดพลาด ลองใหม่อีกครั้ง'); });
};

// ── URL param: shared result ──────────────────────────────────────────────
window.onload = function() {
    var params = new URLSearchParams(location.search);
    var shared = params.get('result');
    if (shared) {
        var char = characters.find(function(c) { return c.id === shared; });
        if (char) {
            progSec.style.display = 'none';
            content.innerHTML = `
                <div class="result-box">
                    <div class="result-emoji-wrap">${char.emoji}</div>
                    <div class="result-title" style="color:${char.color};">${char.name}</div>
                    <div class="result-desc">${char.desc}</div>
                    <p style="color:var(--muted);font-size:13px;margin-bottom:22px;">
                        เพื่อนของคุณแชร์ผลลัพธ์นี้มา
                    </p>
                    <div class="btn-group" style="justify-content:center;">
                        <button class="btn btn-primary"
                            onclick="window.location.href=location.pathname">
                            ลองเล่นด้วยตัวเอง
                        </button>
                        <button class="btn btn-secondary"
                            onclick="window.location.href='index.html'">
                            หน้าหลัก
                        </button>
                    </div>
                </div>`;
            return;
        }
    }
    renderStart();
};
</script>
