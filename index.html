<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌸 สุขสันต์วันเกิดนะ กัคญาภัค 🌸</title>
  <!-- ฟอนต์น่ารัก -->
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Mitr', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #fce8e0;
      background-image: radial-gradient(circle at 20% 30%, #ffe6d5 0%, #ffd9c5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      position: relative;
    }

    /* กล่องหลัก */
    .birthday-box {
      background: rgba(255, 248, 240, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 35px 25px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 35px rgba(200, 120, 100, 0.15),
                  0 0 0 4px #fde4d3 inset,
                  0 0 0 8px #ffcab8 inset;
      text-align: center;
      border: 2px solid #ffb79a;
      position: relative;
      z-index: 10;
    }

    h1 {
      font-size: 2.5rem;
      color: #b3513a;
      text-shadow: 3px 3px 0 #ffc6ad;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .birthday-name {
      font-size: 2.8rem;
      font-weight: 600;
      color: #9c3e2a;
      background: #fff1e6;
      display: inline-block;
      padding: 5px 30px;
      border-radius: 60px;
      margin: 10px 0 5px;
      box-shadow: 0 6px 0 #d49b84;
      border: 2px solid #ffc3aa;
    }

    .birth-date {
      font-size: 1.6rem;
      color: #a6523e;
      margin-bottom: 15px;
    }

    .photo-gallery {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0 25px;
      flex-wrap: wrap;
    }

    .flower-photo {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 35px;
      border: 5px solid #fff4ec;
      box-shadow: 0 12px 0 #b57962, 0 8px 15px rgba(160, 80, 60, 0.2);
      background: #ffe2d4;
      transition: transform 0.2s;
    }

    .flower-photo:hover {
      transform: scale(1.02);
    }

    .question-text {
      font-size: 2rem;
      color: #af4f37;
      margin: 10px 0 5px;
    }

    .cute-emoji {
      font-size: 2.8rem;
      line-height: 1.3;
    }

    /* ตัวเลือกดอกไม้ */
    .flower-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 10px;
    }

    .flower-btn {
      background: #ffe0d1;
      border: 4px solid #ffb294;
      border-radius: 80px;
      padding: 14px 22px;
      font-size: 1.5rem;
      font-weight: 500;
      color: #712e1c;
      box-shadow: 0 7px 0 #b16f58;
      cursor: pointer;
      transition: 0.1s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 3px solid #fff1e9;
      user-select: none;
    }

    .flower-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #b16f58;
    }

    .flower-btn.selected {
      background: #fec9b3;
      box-shadow: 0 4px 0 #9f5f48;
      transform: translateY(3px);
      border-color: #ff987a;
    }

    .action-area {
      margin: 30px 0 15px;
    }

    .confirm-btn {
      background: #f8a68c;
      background: linear-gradient(145deg, #fcb9a2, #f28e74);
      border: none;
      border-radius: 999px;
      padding: 20px 40px;
      font-size: 2.2rem;
      font-weight: 600;
      color: white;
      text-shadow: 2px 2px 0 #b1533a;
      box-shadow: 0 12px 0 #a1452e, 0 8px 15px #d49a84;
      cursor: pointer;
      border: 4px solid #ffede3;
      transition: 0.1s;
      width: 90%;
      max-width: 400px;
      margin: 0 auto;
    }

    .confirm-btn:active {
      transform: translateY(6px);
      box-shadow: 0 6px 0 #a1452e, 0 8px 15px #c0816b;
    }

    .message-box {
      margin-top: 25px;
      background: #fff6ef;
      border-radius: 50px;
      padding: 18px 20px;
      border: 3px dashed #e09b83;
      font-size: 1.4rem;
      color: #6a3422;
    }

    .final-message {
      font-size: 1.8rem;
      color: #b14127;
      font-weight: 500;
      margin-top: 15px;
    }

    .note {
      font-size: 1.2rem;
      color: #b5654f;
      margin-top: 10px;
    }

    .float-decoration {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      font-size: 30px;
    }

    /* responsive */
    @media (max-width: 500px) {
      .birthday-box { padding: 25px 15px; }
      h1 { font-size: 2rem; }
      .birthday-name { font-size: 2.2rem; }
      .flower-photo { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>

  <!-- ของตกแต่ง -->
  <div class="float-decoration" style="top: 5%; left: 5%;">🌸</div>
  <div class="float-decoration" style="bottom: 8%; right: 6%;">🎂</div>
  <div class="float-decoration" style="top: 20%; right: 8%;">🧁</div>
  <div class="float-decoration" style="bottom: 20%; left: 10%;">🎁</div>

  <div class="birthday-box">
    <!-- หัวข้อหลัก -->
    <div class="cute-emoji">🌸🎂🌸</div>
    <h1>🎉 สุขสันต์วันเกิดนะ 🎉</h1>
    <div class="birthday-name">🌸 กัคญาภัค อารียา 🌸</div>
    <div class="birth-date">🎈 20 กันยายน 2012 🎈</div>
    <div class="cute-emoji">🐣💐🐻‍❄️</div>

    <!-- รูปภาพดอกไม้ 2 รูป (จากลิงก์ที่ให้มา) -->
    <div class="photo-gallery">
      <img class="flower-photo" src="https://cdn.phototourl.com/free/2026-04-09-05d725b3-8394-4683-a8d3-4545ab73140b.jpg" alt="ดอกไม้ช่อที่1" loading="lazy">
      <img class="flower-photo" src="https://cdn.phototourl.com/free/2026-04-09-fa77c4e6-954f-4035-9c57-4db69d3c6535.jpg" alt="ดอกไม้ช่อที่2" loading="lazy">
    </div>

    <!-- คำถามเล็ก ๆ -->
    <div class="question-text">💬 อยากได้ดอกไม้แบบไหนดี?</div>
    <div class="cute-emoji" style="font-size: 2rem;">👇 เลือกเลย ไม่ต้องเกรงใจนะ! 👇</div>

    <!-- ตัวเลือกดอกไม้ (ช้อย) -->
    <div class="flower-options">
      <div class="flower-btn" data-flower="🌸 ช่อดอกไม้สีชมพูหวาน ๆ">🌸 ชมพูหวาน</div>
      <div class="flower-btn" data-flower="🌻 ช่อทานตะวันสดใส">🌻 ทานตะวัน</div>
      <div class="flower-btn" data-flower="🌷 ช่อทิวลิปน่ารัก">🌷 ทิวลิป</div>
      <div class="flower-btn" data-flower="💐 ช่อดอกไม้รวม (เซอร์ไพรส์)">💐 แบบเซอร์ไพรส์</div>
    </div>

    <!-- ปุ่มยืนยัน "ซื้อให้เลย" -->
    <div class="action-area">
      <button id="buyButton" class="confirm-btn">🎁 ซื้อดอกไม้ให้เลย! 🎁</button>
    </div>

    <!-- ส่วนแสดงข้อความหลังจากเลือก + ซื้อ -->
    <div id="resultArea" class="message-box">
      <span id="selectedFlowerText">ยังไม่ได้เลือกดอกไม้</span>
    </div>
    <div id="finalMessage" class="final-message"></div>
    <div class="note">💖 ไม่ต้องเกรงใจเลยน้าา ซื้อให้เพราะอยากให้จริง ๆ 💖</div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- ข้อมูลผู้รับ -----
      const receiverName = "กัคญาภัค อารียา";
      const birthInfo = "20 กันยายน 2012";

      // ----- Elements -----
      const flowerBtns = document.querySelectorAll('.flower-btn');
      const buyBtn = document.getElementById('buyButton');
      const selectedFlowerSpan = document.getElementById('selectedFlowerText');
      const finalMessageDiv = document.getElementById('finalMessage');

      // ----- State -----
      let selectedFlower = null;          // เก็บข้อความดอกไม้ที่เลือก
      let hasPurchased = false;

      // ----- ฟังก์ชันจัดการเลือกดอกไม้ -----
      function selectFlower(btn, flowerName) {
        // ลบคลาส selected จากทุกปุ่ม
        flowerBtns.forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedFlower = flowerName;
        
        // อัปเดตข้อความแสดงผล
        selectedFlowerSpan.innerHTML = `🌸 คุณเลือก: <strong>${flowerName}</strong> 🌸`;
        
        // ถ้าเคยกดซื้อแล้วแต่เปลี่ยนใจเปลี่ยนดอกไม้ ให้เคลียร์ข้อความสุดท้าย
        if (hasPurchased) {
          finalMessageDiv.innerHTML = '';
          hasPurchased = false;
        }
      }

      // ----- Event listener ปุ่มดอกไม้ -----
      flowerBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          const flower = btn.getAttribute('data-flower');
          selectFlower(btn, flower);
        });
      });

      // ----- เมื่อกดปุ่ม "ซื้อดอกไม้ให้เลย" -----
      function handlePurchase() {
        if (!selectedFlower) {
          // ยังไม่ได้เลือก
          selectedFlowerSpan.innerHTML = '🥺 กรุณาเลือกดอกไม้ก่อนน้าา ~';
          finalMessageDiv.innerHTML = '👉 กดเลือกช่อที่ชอบด้านบนเลย 👈';
          return;
        }

        // สร้างข้อความน่ารัก
        const purchaseMessage = `🎉 ซื้อให้แล้วนะ! ${selectedFlower} 🎉`;
        const extraMessage = `💝 สุขสันต์วันเกิดอีกครั้งนะ ${receiverName} 🎂✨<br>🌼 อายุครบ ${new Date().getFullYear() - 2012} ขวบแล้ว ขอให้มีความสุขมาก ๆ นะ 🌼`;
        
        finalMessageDiv.innerHTML = `${purchaseMessage}<br><span style="font-size:1.4rem;">${extraMessage}</span>`;
        
        // เพิ่มลูกเล่น: หัวใจหรือดอกไม้ปลิว (เล็กน้อย)
        createConfetti();
        
        hasPurchased = true;

        // เปลี่ยนข้อความในกล่องแสดงผลให้รู้ว่าซื้อแล้ว
        selectedFlowerSpan.innerHTML = `✅ สำเร็จ! ${selectedFlower} กำลังจัดส่งให้ ${receiverName} แล้วค่าา ✅`;
      }

      // ----- สร้าง effect ดอกไม้/หัวใจลอย (แบบง่าย) -----
      function createConfetti() {
        for (let i = 0; i < 10; i++) {
          const particle = document.createElement('span');
          particle.innerHTML = ['🌸','💐','🌼','🌷','🎀','✨'][Math.floor(Math.random()*6)];
          particle.style.position = 'fixed';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.fontSize = (20 + Math.random() * 30) + 'px';
          particle.style.pointerEvents = 'none';
          particle.style.zIndex = '999';
          particle.style.animation = 'floatPop 1.8s ease-out forwards';
          particle.style.opacity = '0.9';
          document.body.appendChild(particle);
          setTimeout(() => particle.remove(), 1800);
        }
      }

      // เพิ่ม keyframe ถ้ายังไม่มี
      if (!document.getElementById('animStyle')) {
        const style = document.createElement('style');
        style.id = 'animStyle';
        style.textContent = `
          @keyframes floatPop {
            0% { opacity: 0.7; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
          }
        `;
        document.head.appendChild(style);
      }

      buyBtn.addEventListener('click', handlePurchase);

      // ตั้งค่าเริ่มต้น: ยังไม่เลือกอะไร
      selectedFlowerSpan.innerHTML = '🌸 รอเลือกดอกไม้สวย ๆ อยู่น้าา 🌸';

      // Optional: ถ้าอยากให้มีข้อความเริ่มต้นน่ารัก
      // สามารถเพิ่มคำแนะนำเล็ก ๆ
      const noteHint = document.createElement('div');
      
      // ถ้ามีการกดปุ่มโดยไม่เลือก แสดงข้อความตามที่ทำไปแล้ว
      
      // ใส่ข้อมูลเพิ่มเติมให้คนใช้รู้ว่าไม่ต้องเกรงใจ
      // แสดงอายุแบบ dynamic
      const age = new Date().getFullYear() - 2012;
      // สามารถใส่ในส่วนข้อความได้เลย
      
      // เพิ่มเติม: ปรับข้อความ final ให้มีอายุ
      // เราได้ใส่ใน handlePurchase แล้ว
      
      // ถ้าต้องการให้มีข้อความตอนโหลดหน้าเว็บ
      window.addEventListener('load', () => {
        // ข้อความต้อนรับเล็กน้อย
      });

    })();
  </script>

  <!-- เพิ่มเติมการตกแต่งและข้อความไม่ต้องเกรงใจ -->
  <div style="display:none;">🎂🎂🎂</div>
</body>
</html>
