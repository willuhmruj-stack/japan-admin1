<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้าน APK</title>
    
    <!-- CSS ภายนอก -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- หัวข้อร้าน -->
        <h1 class="shop-title">🎮 ร้านค้า APK</h1>
        
        <!-- ส่วนแสดงรายการสินค้า (การ์ด) -->
        <div id="products-list" class="products-grid">
            <!-- กำลังโหลด... -->
            <p style="color:white; text-align:center;">กำลังโหลดสินค้า...</p>
        </div>
        
        <!-- ปุ่มไปหน้าล็อกอิน (สำหรับลูกค้าที่ยังไม่ล็อกอิน) -->
        <div class="login-link">
            <p>🔐 <a href="login.html">ล็อกอินเพื่อซื้อสินค้า</a></p>
        </div>
    </div>

    <!-- JavaScript ของระบบ -->
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // เมื่อโหลดหน้าเสร็จ ให้ดึงสินค้าจาก Firestore มาแสดง
        document.addEventListener('DOMContentLoaded', function() {
            const productsContainer = document.getElementById('products-list');
            
            // ตรวจสอบว่า Firestore พร้อมใช้งาน (จาก firebase.js)
            if (typeof db === 'undefined') {
                productsContainer.innerHTML = '<p style="color:red;">❌ ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>';
                return;
            }
            
            // ดึงข้อมูลสินค้าทั้งหมดจาก collection "products"
            db.collection("products").get().then((querySnapshot) => {
                if (querySnapshot.empty) {
                    productsContainer.innerHTML = '<p style="color:white;">ยังไม่มีสินค้าในร้าน</p>';
                    return;
                }
                
                let html = '';
                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    html += `
                        <div class="product-card">
                            <img src="${product.imageUrl || 'images/app-icon.png'}" alt="${product.name}" class="product-image">
                            <h3>${product.name}</h3>
                            <p class="product-price">💰 ${product.price} บาท</p>
                            <p class="product-desc">${product.description || ''}</p>
                            <a href="product-detail.html?id=${doc.id}" class="btn-detail">ดูรายละเอียด</a>
                        </div>
                    `;
                });
                productsContainer.innerHTML = html;
            }).catch((error) => {
                console.error("Error getting products: ", error);
                productsContainer.innerHTML = '<p style="color:red;">⚠️ โหลดสินค้าไม่สำเร็จ</p>';
            });
        });
    </script>
</body>
</html>
