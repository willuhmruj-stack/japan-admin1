<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #loginBox {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: #111;
      border: 1px solid #222;
      border-radius: 20px;
      padding: 40px 32px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      width: 52px;
      height: 52px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-bottom: 16px;
    }

    .login-logo h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }

    .login-logo p {
      font-size: 13px;
      color: #555;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 16px;
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 10px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: #444;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.85; }

    #loginErr {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #ff4444;
      display: none;
    }

    /* ── Main ── */
    #mainBox {
      display: none;
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .top-bar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .top-bar span {
      font-size: 12px;
      color: #444;
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .num {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 11px;
      color: #444;
    }

    /* ── Section ── */
    .section {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: #666;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section input {
      width: 100%;
      padding: 11px 14px;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0;
    }

    .section input:focus { border-color: #333; }

    .btn-create {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    .btn-create:hover { opacity: 0.85; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .btn-refresh {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid #222;
      border-radius: 8px;
      color: #666;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: auto;
      margin: 0;
    }

    .btn-refresh:hover { border-color: #444; color: #aaa; }

    /* ── Key Item ── */
    .key-item {
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .key-item:hover { border-color: #2a2a2a; }

    .key-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .key-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      font-family: monospace;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-active   { background: #0d2818; color: #22c55e; border: 1px solid #166534; }
    .badge-inactive { background: #1f0d0d; color: #ef4444; border: 1px solid #7f1d1d; }

    .key-meta {
      font-size: 12px;
      color: #444;
      margin-bottom: 10px;
    }

    .key-meta span { margin-right: 16px; }

    .key-actions {
      display: flex;
      gap: 6px;
    }

    .btn-block {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 6px;
      color: #aaa;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      margin: 0;
    }

    .btn-block:hover { border-color: #555; color: #fff; }

    .btn-unblock {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #166534;
      border-radius: 6px;
      color: #22c55e;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      margin: 0;
    }

    .btn-delete {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #7f1d1d;
      border-radius: 6px;
      color: #ef4444;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      margin: 0;
    }

    .btn-delete:hover { background: #1f0d0d; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #333;
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginBox">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🗝️</div>
      <h2>Japan Admin</h2>
      <p>ระบบจัดการ License Key</p>
    </div>
    <div class="input-wrap">
      <input type="password" id="adminPass" placeholder="รหัสผ่านแอดมิน">
    </div>
    <button class="btn-primary" onclick="login()">เข้าสู่ระบบ</button>
    <p id="loginErr">รหัสผ่านไม่ถูกต้อง</p>
  </div>
</div>

<!-- Main -->
<div id="mainBox">
  <div class="top-bar">
    <h1>🗝️ Japan Admin</h1>
    <span id="dateLabel"></span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="statTotal">-</div>
      <div class="label">Key ทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statActive" style="color:#22c55e">-</div>
      <div class="label">ใช้งานได้</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statInactive" style="color:#ef4444">-</div>
      <div class="label">ปิดใช้งาน</div>
    </div>
  </div>

  <!-- สร้าง Key -->
  <div class="section">
    <div class="section-title">สร้าง Key ใหม่</div>
    <div class="form-row">
      <input type="text" id="newKey" placeholder="Key เช่น RUJ-124">
      <input type="date" id="newExpiry">
    </div>
    <input type="text" id="newNote" placeholder="หมายเหตุ เช่น ชื่อผู้ใช้" style="width:100%">
    <button class="btn-create" onclick="createKey()">+ สร้าง Key</button>
  </div>

  <!-- รายการ Key -->
  <div class="section">
    <div class="refresh-row">
      <div class="section-title" style="margin:0">รายการ Key</div>
      <button class="btn-refresh" onclick="loadKeys()">↻ รีเฟรช</button>
    </div>
    <div id="keyList"><div class="empty-state">กำลังโหลด...</div></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const ADMIN_PASSWORD = "admin888";
  const SUPABASE_URL   = "https://ymwlstntuhnmpzmnaioz.supabase.co";
  const SUPABASE_KEY   = "sb_publishable__6ejNqJVcL0qWsVIdR-3bw_fUNMc3I8";
  const HEADERS = {
    "Content-Type":  "application/json",
    "apikey":        SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY
  };

  // วันที่
  document.getElementById("dateLabel").textContent =
    new Date().toLocaleDateString("th-TH", { dateStyle: "medium" });

  function login() {
    if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("mainBox").style.display  = "block";
      loadKeys();
    } else {
      document.getElementById("loginErr").style.display = "block";
    }
  }

  document.getElementById("adminPass").addEventListener("keydown", function(e) {
    if (e.key === "Enter") login();
  });

  function loadKeys() {
    document.getElementById("keyList").innerHTML =
      "<div class='empty-state'>กำลังโหลด...</div>";

    fetch(SUPABASE_URL + "/rest/v1/keys?select=*&order=id.asc", { headers: HEADERS })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = document.getElementById("keyList");

        // Stats
        var active   = data.filter(function(k) { return k.status === "active"; }).length;
        var inactive = data.length - active;
        document.getElementById("statTotal").textContent   = data.length;
        document.getElementById("statActive").textContent  = active;
        document.getElementById("statInactive").textContent = inactive;

        if (!data || data.length === 0) {
          list.innerHTML = "<div class='empty-state'>ยังไม่มี Key</div>";
          return;
        }

        list.innerHTML = "";
        data.forEach(function(k) {
          var isActive = k.status === "active";
          var today    = new Date().toISOString().slice(0, 10);
          var expired  = k.expiry && k.expiry < today;

          list.innerHTML +=
            "<div class='key-item'>" +
              "<div class='key-header'>" +
                "<span class='key-name'>" + k.key + "</span>" +
                "<span class='badge " + (isActive ? "badge-active" : "badge-inactive") + "'>" +
                  (isActive ? (expired ? "หมดอายุ" : "ใช้งานได้") : "ปิดใช้งาน") +
                "</span>" +
              "</div>" +
              "<div class='key-meta'>" +
                "<span>📅 " + (k.expiry || "ไม่มีกำหนด") + "</span>" +
                "<span>📝 " + (k.note || "-") + "</span>" +
              "</div>" +
              "<div class='key-actions'>" +
                "<button class='" + (isActive ? "btn-block" : "btn-unblock") + "' " +
                  "onclick=\"toggleKey(" + k.id + ",'" + (isActive ? "inactive" : "active") + "')\">" +
                  (isActive ? "บล็อก" : "ปลดบล็อก") +
                "</button>" +
                "<button class='btn-delete' onclick='deleteKey(" + k.id + ")'>ลบ</button>" +
              "</div>" +
            "</div>";
        });
      })
      .catch(function() { showToast("โหลดไม่ได้ ลองใหม่"); });
  }

  function createKey() {
    var key    = document.getElementById("newKey").value.trim();
    var expiry = document.getElementById("newExpiry").value;
    var note   = document.getElementById("newNote").value.trim();
    if (!key) { showToast("กรุณาใส่ Key"); return; }

    fetch(SUPABASE_URL + "/rest/v1/keys", {
      method: "POST",
      headers: Object.assign({}, HEADERS, { "Prefer": "return=minimal" }),
      body: JSON.stringify({ key: key, status: "active", expiry: expiry, note: note })
    }).then(function() {
      showToast("✓ สร้าง Key สำเร็จ");
      document.getElementById("newKey").value    = "";
      document.getElementById("newExpiry").value = "";
      document.getElementById("newNote").value   = "";
      loadKeys();
    });
  }

  function toggleKey(id, status) {
    fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
      method: "PATCH",
      headers: HEADERS,
      body: JSON.stringify({ status: status })
    }).then(function() {
      showToast(status === "active" ? "✓ ปลดบล็อกสำเร็จ" : "✓ บล็อกสำเร็จ");
      loadKeys();
    });
  }

  function deleteKey(id) {
    if (!confirm("ลบ Key นี้?")) return;
    fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
      method: "DELETE",
      headers: HEADERS
    }).then(function() {
      showToast("✓ ลบสำเร็จ");
      loadKeys();
    });
  }

  function showToast(text) {
    var el = document.getElementById("toast");
    el.textContent = text;
    el.classList.add("show");
    setTimeout(function() { el.classList.remove("show"); }, 2500);
  }
</script>
</body>
  </html>
