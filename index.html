<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>เป็นแฟนเค้าหน่อยน้าาา 💖</title>
  <!-- ฟอนต์น่ารัก -->
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Mitr', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* กล่องหลัก */
    .container {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 40px 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 40px rgba(244, 143, 177, 0.2),
                  0 0 0 2px #fff9fb inset;
      text-align: center;
      border: 1px solid rgba(255, 220, 240, 0.8);
      transition: all 0.3s ease;
    }

    /* ส่วนคำถาม (แสดงตอนเริ่ม) */
    .question-section {
      display: block;
    }

    h1 {
      color: #b3406c;
      font-size: 2.8rem;
      font-weight: 600;
      text-shadow: 4px 4px 0 #ffbfd5;
      letter-spacing: 1px;
      margin-bottom: 15px;
      word-break: break-word;
    }

    .cute-emoji {
      font-size: 3.5rem;
      line-height: 1.2;
      filter: drop-shadow(0 6px 6px rgba(0,0,0,0.05));
    }

    .button-group {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 30px 0 20px;
      flex-wrap: wrap;
      min-height: 180px;
    }

    /* ปุ่มพื้นฐาน */
    .btn {
      border: none;
      border-radius: 999px;
      padding: 18px 35px;
      font-size: 2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 12px 0 #b34e7a, 0 8px 20px rgba(180, 60, 100, 0.25);
      transition: all 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      border: 3px solid #fff5fb;
      letter-spacing: 2px;
      color: white;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transform: scale(1);
      line-height: 1.2;
      user-select: none;
      touch-action: manipulation;
    }

    .btn-yes {
      background: #ff85a8;
      background: linear-gradient(145deg, #ff98b9, #ff6f9b);
      box-shadow: 0 12px 0 #a13e63, 0 8px 20px rgba(200, 60, 100, 0.3);
    }

    .btn-no {
      background: #b0b0c0;
      background: linear-gradient(145deg, #c2c2d6, #a5a5bb);
      box-shadow: 0 12px 0 #6e6e88, 0 8px 20px rgba(100, 100, 130, 0.25);
      position: relative;
      /* จะขยับได้ด้วย transform */
    }

    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 7px 0 #a13e63, 0 8px 20px rgba(180,60,100,0.25);
    }

    /* ปุ่มไม่เป็น — เพิ่ม transition ให้ smooth */
    .btn-no {
      transition: transform 0.25s ease, box-shadow 0.2s, top 0.2s, left 0.2s, width 0.2s, height 0.2s, font-size 0.2s;
    }

    /* ส่วนแสดงผลหลังจากกด "เป็นแฟน" */
    .success-section {
      display: none;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }

    .success-card {
      background: #fff0f5;
      border-radius: 40px;
      padding: 30px 20px;
      border: 4px dashed #ff98b9;
    }

    .success-card h2 {
      color: #c44a7a;
      font-size: 2.5rem;
      margin-bottom: 25px;
    }

    .input-group {
      margin: 20px 0;
    }

    .cute-input {
      width: 90%;
      padding: 18px 22px;
      font-size: 1.4rem;
      border: 3px solid #ffb0c8;
      border-radius: 60px;
      background: white;
      outline: none;
      color: #5e3a4a;
      text-align: center;
      transition: all 0.2s;
      font-weight: 400;
    }

    .cute-input:focus {
      border-color: #ff6f9b;
      box-shadow: 0 0 0 6px rgba(255, 111, 155, 0.2);
    }

    .submit-message-btn {
      background: #ff85a8;
      border: none;
      color: white;
      font-size: 1.8rem;
      padding: 16px 30px;
      border-radius: 999px;
      font-weight: 600;
      margin-top: 15px;
      box-shadow: 0 8px 0 #a13e63;
      cursor: pointer;
      border: 3px solid #fff5fb;
      transition: 0.1s;
      width: 80%;
    }

    .submit-message-btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #a13e63;
    }

    .small-note {
      margin-top: 25px;
      color: #b36b89;
      font-size: 1.2rem;
    }

    /* รูปหัวใจตกแต่ง */
    .floating-heart {
      position: absolute;
      color: #ffb7c5;
      font-size: 24px;
      user-select: none;
      pointer-events: none;
      z-index: 0;
    }

    /* responsive */
    @media (max-width: 480px) {
      .container { padding: 25px 18px; }
      h1 { font-size: 2.2rem; }
      .btn { font-size: 1.6rem; padding: 15px 25px; }
    }
  </style>
</head>
<body>

  <!-- หัวใจลอยๆ ตกแต่ง -->
  <div class="floating-heart" style="top: 10%; left: 5%;">🌸</div>
  <div class="floating-heart" style="bottom: 15%; right: 8%;">🫧</div>
  <div class="floating-heart" style="top: 20%; right: 12%;">🎀</div>
  <div class="floating-heart" style="bottom: 25%; left: 10%;">🐻‍❄️</div>

  <div class="container">
    <!-- ===== หน้าแรก : คำถาม + ปุ่ม ===== -->
    <div id="questionSection" class="question-section">
      <div class="cute-emoji">🥺💗</div>
      <h1>เป็นแฟนเค้าหน่อยนะะ</h1>
      <div class="cute-emoji" style="font-size: 2.5rem;">👇👇</div>

      <div class="button-group">
        <!-- ปุ่ม "เป็นแฟน" -->
        <button id="yesBtn" class="btn btn-yes">✅ เป็นแฟน</button>
        <!-- ปุ่ม "ไม่เป็น" -->
        <button id="noBtn" class="btn btn-no">❌ ไม่เป็น</button>
      </div>
      <p style="color:#b36280; margin-top: 10px; opacity:0.9;">(กด "ไม่เป็น" แล้วมันจะหนี ฮี่ๆ)</p>
    </div>

    <!-- ===== หน้าสำเร็จ : แสดงหลังจากกดเป็นแฟน ===== -->
    <div id="successSection" class="success-section">
      <div class="success-card">
        <div class="cute-emoji">💖🎉💖</div>
        <h2>เย้! ตกลงเป็นแฟนแล้วน้าา</h2>
        <div class="cute-emoji" style="font-size: 3rem;">😽💌</div>
        
        <div class="input-group">
          <input type="text" id="messageInput" class="cute-input" placeholder="บอกรักเค้าหน่อย...">
        </div>
        <button id="sendLoveBtn" class="submit-message-btn">ส่งข้อความหวานๆ 💬</button>
        <div class="small-note">👇 กดแล้วข้อความจะโผล่มาให้เธออ่านน้า</div>
        <div id="loveMessageDisplay" style="margin-top: 20px; font-size: 1.6rem; color:#a13e63; min-height: 50px;"></div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ----- ดึง element หลัก -----
      const questionSection = document.getElementById('questionSection');
      const successSection = document.getElementById('successSection');
      const yesBtn = document.getElementById('yesBtn');
      const noBtn = document.getElementById('noBtn');
      const messageInput = document.getElementById('messageInput');
      const sendLoveBtn = document.getElementById('sendLoveBtn');
      const loveMessageDisplay = document.getElementById('loveMessageDisplay');

      // ----- ตัวแปรควบคุมขนาด / ตำแหน่ง -----
      let yesScale = 1.0;
      let noScale = 1.0;
      // ตำแหน่งของปุ่ม "ไม่เป็น" (เราใช้ transform translate ในการขยับ)
      let noTranslateX = 0;
      let noTranslateY = 0;

      // ขอบเขตการขยับ (เพื่อไม่ให้หลุดจอเกินไป) — จะอัปเดตตามขนาดหน้าจอ
      let maxMoveX = 120;
      let maxMoveY = 60;

      function updateMoveBoundary() {
        // ปรับตามความกว้างหน้าจอเล็กน้อย
        if (window.innerWidth < 500) {
          maxMoveX = 80;
          maxMoveY = 50;
        } else {
          maxMoveX = 140;
          maxMoveY = 70;
        }
      }
      updateMoveBoundary();
      window.addEventListener('resize', updateMoveBoundary);

      // ----- ฟังก์ชันอัปเดตสไตล์ปุ่มตามค่าปัจจุบัน -----
      function updateNoButtonStyle() {
        // รวม scale + translate
        noBtn.style.transform = `translate(${noTranslateX}px, ${noTranslateY}px) scale(${noScale})`;
        // ทำให้ขนาดตัวอักษรเล็กลงตาม scale (เพิ่มความน่ารัก)
        const baseFontSize = 2.0; // rem
        noBtn.style.fontSize = (baseFontSize * noScale) + 'rem';
        noBtn.style.padding = `${16 * noScale}px ${30 * noScale}px`;
      }

      function updateYesButtonStyle() {
        yesBtn.style.transform = `scale(${yesScale})`;
        const baseFontSize = 2.0;
        yesBtn.style.fontSize = (baseFontSize * yesScale) + 'rem';
        yesBtn.style.padding = `${16 * yesScale}px ${30 * yesScale}px`;
      }

      // เริ่มต้นเซ็ตค่า
      updateNoButtonStyle();
      updateYesButtonStyle();

      // ----- การกระทำเมื่อกดปุ่ม "ไม่เป็น" -----
      function handleNoClick(e) {
        e.preventDefault();
        
        // 1. ลดขนาดปุ่มไม่เป็น (แต่ไม่เล็กเกินไป)
        noScale = Math.max(0.45, noScale * 0.82);
        
        // 2. ขยับตำแหน่งแบบสุ่ม (หนี)
        const randomX = (Math.random() - 0.5) * 2 * maxMoveX;
        const randomY = (Math.random() - 0.5) * 2 * maxMoveY;
        noTranslateX = randomX;
        noTranslateY = randomY;
        
        // 3. ทำให้ปุ่ม "เป็นแฟน" ใหญ่ขึ้น (แต่ไม่เกิน 2.6 เท่า)
        yesScale = Math.min(2.6, yesScale * 1.2);
        
        // 4. อัปเดตการแสดงผล
        updateNoButtonStyle();
        updateYesButtonStyle();

        // 5. เพิ่มลูกเล่น: ถ้ากด "ไม่เป็น" หลายครั้งจนเล็กมาก อาจเด้งคำใบ้
        if (noScale < 0.65) {
          // ขยับเพิ่มความซน
        }
      }

      // ----- การกระทำเมื่อกดปุ่ม "เป็นแฟน" -----
      function handleYesClick() {
        // ซ่อนหน้าคำถาม แสดงหน้าสำเร็จ
        questionSection.style.display = 'none';
        successSection.style.display = 'block';
        
        // (optional) ล็อคไม่ให้กดอะไรอีกแล้ว
      }

      // ----- ระบบส่งข้อความหวาน -----
      function handleSendLove() {
        const msg = messageInput.value.trim();
        if (msg === '') {
          loveMessageDisplay.innerHTML = '💬 อยากอ่านข้อความจากใจเธอจัง... 🥺';
          return;
        }
        // แสดงข้อความน่ารัก
        loveMessageDisplay.innerHTML = `💕 "${escapeHtml(msg)}" 💕<br><span style="font-size:1.2rem;">ขอบคุณที่เป็นแฟนเค้านะะ รักที่สุดเลยย 😘</span>`;
        messageInput.value = ''; // เคลียร์ช่อง
        
        // เพิ่มลูกเล่นหัวใจลอย (ไม่ทำก็ได้)
      }

      // ฟังก์ชันกัน XSS แบบง่าย
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // เพิ่ม event ให้ปุ่ม "ไม่เป็น" (ใช้ click เพื่อให้รู้สึกว่ากดแล้วหนี)
      noBtn.addEventListener('click', handleNoClick);
      
      // แต่ปัญหาคือ: ถ้าปุ่มมันหนีไปเรื่อยๆ การกดจะยากขึ้นเอง
      // นอกจากนี้ถ้า mouse enter ก็ไม่ต้องหนี เพราะเราใช้ click อย่างเดียวตามที่ขอ
      
      // Event ปุ่ม "เป็นแฟน"
      yesBtn.addEventListener('click', handleYesClick);

      // Event ปุ่มส่งข้อความ
      sendLoveBtn.addEventListener('click', handleSendLove);
      
      // สามารถกด Enter ในช่อง input ก็ได้
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendLoveBtn.click();
        }
      });

      // ป้องกันการกดปุ่มไม่เป็นโดยบังเอิญดับเบิลคลิก (ไม่ต้องทำอะไรเพิ่ม)
      // เสริม: ถ้าคนพยายามกดไม่เป็นมือถือจะโอเค

      // เพิ่มเติมความน่ารัก: ถ้ากด "ไม่เป็น" หลายครั้งมากๆ อาจมีข้อความ pop เล็กๆ
      // แต่ไม่จำเป็น ปล่อยให้ขำๆ

      // ----- รีเซ็ตตำแหน่งปุ่มหากมีการเปลี่ยนขนาดหน้าจอ (ไม่ให้หลุดจอ) -----
      window.addEventListener('resize', () => {
        // clamp ตำแหน่งคร่าวๆ
        updateMoveBoundary();
        noTranslateX = Math.min(maxMoveX, Math.max(-maxMoveX, noTranslateX));
        noTranslateY = Math.min(maxMoveY, Math.max(-maxMoveY, noTranslateY));
        updateNoButtonStyle();
      });

      // ป้องกัน iOS zoom เวลาดับเบิลแตะ (ไม่จำเป็น)
    })();
  </script>
</body>
</html>
