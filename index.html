<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
    h1 { text-align: center; margin-bottom: 24px; }
    #loginBox { max-width: 340px; margin: 80px auto; background: #1a1a1a; padding: 32px; border-radius: 16px; border: 1px solid #333; }
    #loginBox h2 { text-align: center; margin-bottom: 20px; }
    #mainBox { display: none; max-width: 600px; margin: 0 auto; }
    input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 12px; font-size: 14px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
    .btn-green  { background: #1db954; color: #fff; }
    .btn-red    { background: #e03131; color: #fff; }
    .btn-yellow { background: #f59f00; color: #000; }
    .btn-gray   { background: #333; color: #fff; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card h3 { margin-bottom: 12px; color: #aaa; font-size: 13px; }
    .key-item { background: #222; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .key-info { font-size: 13px; margin-bottom: 8px; }
    .key-info span { color: #aaa; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
    .badge-active   { background: #1db95422; color: #1db954; border: 1px solid #1db954; }
    .badge-inactive { background: #e0313122; color: #e03131; border: 1px solid #e03131; }
    .key-actions { display: flex; gap: 6px; }
    .key-actions button { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
    #msg { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 12px; display: none; }
    .msg-ok  { background: #1db95422; color: #1db954; }
    .msg-err { background: #e0313122; color: #e03131; }
  </style>
</head>
<body>

<div id="loginBox">
  <h2>🔐 เข้าสู่ระบบแอดมิน</h2>
  <input type="password" id="adminPass" placeholder="รหัสแอดมิน">
  <button class="btn-green" onclick="login()">เข้าสู่ระบบ</button>
  <p id="loginErr" style="color:#e03131;text-align:center;margin-top:8px;display:none">รหัสไม่ถูกต้อง</p>
</div>

<div id="mainBox">
  <h1>🗝️ Japan Key Admin</h1>
  <div id="msg"></div>

  <div class="card">
    <h3>➕ สร้าง Key ใหม่</h3>
    <input type="text" id="newKey"    placeholder="Key เช่น RUJ-124">
    <input type="date" id="newExpiry">
    <input type="text" id="newNote"   placeholder="หมายเหตุ เช่น ชื่อผู้ใช้">
    <button class="btn-green" onclick="createKey()">สร้าง Key</button>
  </div>

  <div class="card">
    <h3>📋 รายการ Key ทั้งหมด</h3>
    <button class="btn-gray" onclick="loadKeys()" style="margin-bottom:12px">🔄 รีเฟรช</button>
    <div id="keyList">กำลังโหลด...</div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "admin888";
  const SUPABASE_URL   = "https://ymwlstntuhnmpzmnaioz.supabase.co";
  const SUPABASE_KEY   = "sb_publishable__6ejNqJVcL0qWsVIdR-3bw_fUNMc3I8";
  const HEADERS = {
    "Content-Type":  "application/json",
    "apikey":        SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY
  };

  function login() {
    if (document.getElementById("adminPass").value === ADMIN_PASSWORD) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("mainBox").style.display  = "block";
      loadKeys();
    } else {
      document.getElementById("loginErr").style.display = "block";
    }
  }

  document.getElementById("adminPass").addEventListener("keydown", function(e) {
    if (e.key === "Enter") login();
  });

  function loadKeys() {
    document.getElementById("keyList").innerHTML = "กำลังโหลด...";
    fetch(SUPABASE_URL + "/rest/v1/keys?select=*&order=id.asc", { headers: HEADERS })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var list = document.getElementById("keyList");
        if (!data || data.length === 0) {
          list.innerHTML = "<p style='color:#aaa;text-align:center'>ยังไม่มี Key</p>";
          return;
        }
        list.innerHTML = "";
        data.forEach(function(k) {
          var isActive = k.status === "active";
          list.innerHTML += "<div class='key-item'>" +
            "<div class='key-info'><strong>" + k.key + "</strong><br>" +
            "<span>หมดอายุ: " + (k.expiry || "-") + "</span><br>" +
            "<span>หมายเหตุ: " + (k.note || "-") + "</span></div>" +
            "<span class='badge " + (isActive ? "badge-active" : "badge-inactive") + "'>" +
            (isActive ? "ใช้งานได้" : "ปิดใช้งาน") + "</span><br>" +
            "<div class='key-actions'>" +
            "<button class='" + (isActive ? "btn-yellow" : "btn-green") + "' onclick=\"toggleKey(" + k.id + ",'" + (isActive ? "inactive" : "active") + "')\">" +
            (isActive ? "บล็อก" : "ปลดบล็อก") + "</button>" +
            "<button class='btn-red' onclick='deleteKey(" + k.id + ")'>ลบ</button>" +
            "</div></div>";
        });
      })
      .catch(function() { showMsg("โหลดไม่ได้", false); });
  }

  function createKey() {
    var key    = document.getElementById("newKey").value.trim();
    var expiry = document.getElementById("newExpiry").value;
    var note   = document.getElementById("newNote").value.trim();
    if (!key) { showMsg("กรุณาใส่ Key", false); return; }
    fetch(SUPABASE_URL + "/rest/v1/keys", {
      method: "POST",
      headers: Object.assign({}, HEADERS, { "Prefer": "return=minimal" }),
      body: JSON.stringify({ key: key, status: "active", expiry: expiry, note: note })
    }).then(function() {
      showMsg("สร้าง Key สำเร็จ", true);
      document.getElementById("newKey").value    = "";
      document.getElementById("newExpiry").value = "";
      document.getElementById("newNote").value   = "";
      loadKeys();
    });
  }

  function toggleKey(id, status) {
    fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
      method: "PATCH",
      headers: HEADERS,
      body: JSON.stringify({ status: status })
    }).then(function() {
      showMsg(status === "active" ? "ปลดบล็อกสำเร็จ" : "บล็อกสำเร็จ", true);
      loadKeys();
    });
  }

  function deleteKey(id) {
    if (!confirm("ลบ Key นี้?")) return;
    fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
      method: "DELETE",
      headers: HEADERS
    }).then(function() {
      showMsg("ลบสำเร็จ", true);
      loadKeys();
    });
  }

  function showMsg(text, ok) {
    var el = document.getElementById("msg");
    el.textContent   = text;
    el.className     = ok ? "msg-ok" : "msg-err";
    el.style.display = "block";
    setTimeout(function() { el.style.display = "none"; }, 3000);
  }
</script>
</body>
</html>
