<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชื่อร้าน APK ของคุณ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="images/app-icon.png" alt="ไอคอนแอป" class="app-icon">
        
        <h1>🔥 ฟีฟายโปร</h1>
        <p class="price">💰 ราคา 89 บาท</p>
        <p class="description">แอปเจ๋งๆ ที่ช่วยให้ชีวิตคุณง่ายขึ้น ใช้งานได้จริง ไม่มีโฆษณา</p>
        
        <div class="feature-list">
            <span class="feature">✅ ฟีเจอร์เด็ด 1</span>
            <span class="feature">✅ ฟีเจอร์เด็ด 2</span>
            <span class="feature">✅ ฟีเจอร์เด็ด 3</span>
        </div>
        
        <a href="https://line.me/ti/p/~your-line-id" class="buy-button" target="_blank">
            💬 สั่งซื้อผ่าน LINE
        </a>
        
        <p class="note">📱 แจ้งชื่อแอป + แนบสลิป รับลิงก์ดาวน์โหลดทันที</p>
        
        <div class="screenshots">
            <img src="images/screenshot1.jpg" alt="ภาพหน้าจอแอป">
        </div>
        
        <p class="footer">⚠️ APK สำหรับ Android เท่านั้น</p>
    </div>
</body>
</html>
