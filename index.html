<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #06060a;
  --surface:     #0d0d12;
  --surface2:    #111118;
  --border:      #1a1a28;
  --border2:     #222235;
  --accent1:     #7b5fff;
  --accent2:     #ff5fbb;
  --accent-mid:  #bf5fff;
  --green:       #22d47a;
  --red:         #ff4466;
  --text1:       #eeeef4;
  --text2:       #55556a;
  --text3:       #2a2a3a;
  --tg:          #3d9fe0;
  --yt:          #ee3333;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text1);
  font-family: 'Noto Sans Thai', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══════════════════════════════
   CANVAS PARTICLES
══════════════════════════════ */
#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ══════════════════════════════
   LOGIN
══════════════════════════════ */
#loginBox {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 44px 36px 36px;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(123,95,255,0.15), transparent 70%);
  pointer-events: none;
}

.login-icon-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
}

.login-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
  border: 1px solid var(--border2);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  position: relative;
  box-shadow: 0 0 40px rgba(123,95,255,0.2);
  animation: iconPulse 3s ease-in-out infinite;
}

@keyframes iconPulse {
  0%,100% { box-shadow: 0 0 20px rgba(123,95,255,0.15); }
  50%      { box-shadow: 0 0 50px rgba(191,95,255,0.3); }
}

.login-title {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.login-sub {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  letter-spacing: 0.08em;
  margin-bottom: 32px;
}

.field-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.14em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.field-label::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent-mid);
}

.field-input {
  width: 100%;
  padding: 14px 18px;
  background: #060609;
  border: 1px solid var(--border2);
  border-radius: 12px;
  color: var(--text1);
  font-size: 14px;
  font-family: 'Space Mono', monospace;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
  margin-bottom: 16px;
}

.field-input:focus {
  border-color: var(--accent-mid);
  box-shadow: 0 0 0 3px rgba(191,95,255,0.1);
}

.btn-grad {
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: 0.03em;
}

.btn-grad:hover   { opacity: 0.88; }
.btn-grad:active  { transform: scale(0.98); }

.login-err {
  text-align: center;
  margin-top: 14px;
  font-size: 12px;
  color: var(--red);
  display: none;
}

/* ══════════════════════════════
   MAIN
══════════════════════════════ */
#mainBox {
  display: none;
  position: relative;
  z-index: 10;
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

/* Top bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.top-bar-left h1 {
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  background: linear-gradient(90deg, var(--accent1), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.top-bar-left p {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
}

.logout-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 12px;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border2); }

.stat-card::before {
  content: '';
  position: absolute;
  bottom: -20px; left: 50%;
  transform: translateX(-50%);
  width: 60px; height: 60px;
  border-radius: 50%;
  opacity: 0.06;
}

.stat-card:nth-child(1)::before { background: #fff; }
.stat-card:nth-child(2)::before { background: var(--green); }
.stat-card:nth-child(3)::before { background: var(--red); }

.stat-num {
  font-family: 'Space Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
}

/* Section */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
  margin-bottom: 14px;
}

.sec-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.sec-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.14em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sec-title::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent-mid);
}

/* Form */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.sec-input {
  width: 100%;
  padding: 12px 14px;
  background: #06060a;
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text1);
  font-size: 13px;
  font-family: 'Space Mono', monospace;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.sec-input:focus {
  border-color: var(--accent-mid);
  box-shadow: 0 0 0 3px rgba(191,95,255,0.08);
}

.sec-input::placeholder { color: var(--text3); font-family: 'Noto Sans Thai', sans-serif; }

/* Refresh */
.btn-refresh {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 11px;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-refresh:hover { border-color: var(--accent-mid); color: var(--accent-mid); }

/* Key Item */
.key-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: border-color 0.2s, transform 0.15s;
}

.key-item:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}

.key-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.key-name {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text1);
  letter-spacing: 0.05em;
}

.badge {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
}

.badge-active   { background: rgba(34,212,122,0.08); color: var(--green); border: 1px solid rgba(34,212,122,0.2); }
.badge-inactive { background: rgba(255,68,102,0.08); color: var(--red);   border: 1px solid rgba(255,68,102,0.2); }
.badge-expired  { background: rgba(255,170,50,0.08); color: #ffaa33;      border: 1px solid rgba(255,170,50,0.2); }

.key-meta {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
}

.key-actions { display: flex; gap: 6px; flex-wrap: wrap; }

.btn-sm {
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 11px;
  font-family: 'Noto Sans Thai', sans-serif;
  cursor: pointer;
  transition: all 0.18s;
  border: 1px solid;
}

.btn-block   { background: transparent; border-color: var(--border2); color: var(--text2); }
.btn-block:hover { border-color: #555; color: var(--text1); }

.btn-unblock { background: transparent; border-color: rgba(34,212,122,0.3); color: var(--green); }
.btn-unblock:hover { background: rgba(34,212,122,0.08); }

.btn-del     { background: transparent; border-color: rgba(255,68,102,0.3); color: var(--red); }
.btn-del:hover { background: rgba(255,68,102,0.08); }

/* Divider */
.grad-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-mid), transparent);
  margin: 4px 0 18px;
  opacity: 0.3;
}

/* Empty */
.empty {
  text-align: center;
  padding: 40px;
  color: var(--text3);
  font-size: 13px;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text1);
  padding: 12px 22px;
  border-radius: 12px;
  font-size: 13px;
  z-index: 9999;
  white-space: nowrap;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- ── LOGIN ── -->
<div id="loginBox">
  <div class="login-card">
    <div class="login-icon-wrap">
      <div class="login-icon">✦</div>
    </div>
    <div class="login-title">JAPAN ADMIN</div>
    <div class="login-sub">SECURE ACCESS SYSTEM</div>

    <div class="field-label">รหัสผ่าน</div>
    <input type="password" id="adminPass" class="field-input"
           placeholder="กรอกรหัสผ่านแอดมิน">

    <button class="btn-grad" onclick="login()">เข้าสู่ระบบ</button>
    <p class="login-err" id="loginErr">✕  รหัสผ่านไม่ถูกต้อง</p>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="mainBox">

  <div class="top-bar">
    <div class="top-bar-left">
      <h1>✦ JAPAN ADMIN</h1>
      <p id="dateLabel"></p>
    </div>
    <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="statTotal" style="color:var(--text1)">—</div>
      <div class="stat-label">KEY ทั้งหมด</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--green)">—</div>
      <div class="stat-label">ใช้งานได้</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statInactive" style="color:var(--red)">—</div>
      <div class="stat-label">ปิดใช้งาน</div>
    </div>
  </div>

  <!-- สร้าง Key -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-title">สร้าง Key ใหม่</div>
    </div>
    <div class="grad-line"></div>
    <div class="form-grid">
      <input type="text" id="newKey" class="sec-input" placeholder="KEY เช่น RUJ-124">
      <input type="date" id="newExpiry" class="sec-input">
    </div>
    <input type="text" id="newNote" class="sec-input"
           placeholder="หมายเหตุ เช่น ชื่อผู้ใช้" style="width:100%;margin-bottom:12px">
    <button class="btn-grad" onclick="createKey()" style="width:100%">+ สร้าง Key</button>
  </div>

  <!-- รายการ Key -->
  <div class="section">
    <div class="sec-header">
      <div class="sec-title">รายการ Key</div>
      <button class="btn-refresh" onclick="loadKeys()">↻ รีเฟรช</button>
    </div>
    <div class="grad-line"></div>
    <div id="keyList"><div class="empty">กำลังโหลด...</div></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Config ──
const ADMIN_PASSWORD = "admin888";
const SUPABASE_URL   = "https://ymwlstntuhnmpzmnaioz.supabase.co";
const SUPABASE_KEY   = "sb_publishable__6ejNqJVcL0qWsVIdR-3bw_fUNMc3I8";
const HEADERS = {
  "Content-Type":  "application/json",
  "apikey":        SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY
};

// ── Particles ──
(function() {
  var canvas = document.getElementById("canvas");
  var ctx    = canvas.getContext("2d");
  var W, H, pts = [];
  var colors = ["#7b5fff","#bf5fff","#ff5fbb","#5fffff","#ffaa55"];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    pts = [];
    for (var i = 0; i < 22; i++) {
      pts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -(Math.random() * 0.4 + 0.1),
        r:  Math.random() * 3 + 1,
        a:  Math.random(),
        c:  colors[Math.floor(Math.random() * colors.length)]
      });
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(function(p) {
      p.x += p.vx; p.y += p.vy; p.a -= 0.003;
      if (p.a <= 0 || p.y < 0) {
        p.x = Math.random() * W;
        p.y = H;
        p.a = Math.random() * 0.5 + 0.2;
        p.vy = -(Math.random() * 0.4 + 0.1);
        p.vx = (Math.random() - 0.5) * 0.4;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.c + Math.round(p.a * 99).toString(16).padStart(2,"0");
      ctx.fill();
    });
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", function() { resize(); init(); });
  resize(); init(); loop();
})();

// ── Date ──
document.getElementById("dateLabel").textContent =
  new Date().toLocaleDateString("th-TH", { dateStyle: "full" });

// ── Auth ──
function login() {
  var pass = document.getElementById("adminPass").value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainBox").style.display  = "block";
    loadKeys();
  } else {
    document.getElementById("loginErr").style.display = "block";
    document.getElementById("adminPass").style.borderColor = "var(--red)";
    setTimeout(function() {
      document.getElementById("adminPass").style.borderColor = "";
    }, 1500);
  }
}

function logout() {
  document.getElementById("mainBox").style.display  = "none";
  document.getElementById("loginBox").style.display = "flex";
  document.getElementById("adminPass").value = "";
  document.getElementById("loginErr").style.display = "none";
}

document.getElementById("adminPass").addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

// ── Load Keys ──
function loadKeys() {
  document.getElementById("keyList").innerHTML = "<div class='empty'>กำลังโหลด...</div>";

  fetch(SUPABASE_URL + "/rest/v1/keys?select=*&order=id.asc", { headers: HEADERS })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var today   = new Date().toISOString().slice(0, 10);
      var active  = 0, inactive = 0;
      var html    = "";

      data.forEach(function(k) {
        var isActive  = k.status === "active";
        var isExpired = k.expiry && k.expiry < today && isActive;
        if (isActive && !isExpired) active++;
        else inactive++;

        var badgeClass = isExpired ? "badge-expired"
                       : isActive  ? "badge-active" : "badge-inactive";
        var badgeText  = isExpired ? "หมดอายุ"
                       : isActive  ? "ใช้งานได้" : "ปิดใช้งาน";

        html +=
          "<div class='key-item'>" +
            "<div class='key-top'>" +
              "<span class='key-name'>" + escHtml(k.key) + "</span>" +
              "<span class='badge " + badgeClass + "'>" + badgeText + "</span>" +
            "</div>" +
            "<div class='key-meta'>" +
              "<span>📅 " + (k.expiry || "ไม่มีกำหนด") + "</span>" +
              "<span>📝 " + escHtml(k.note || "—") + "</span>" +
            "</div>" +
            "<div class='key-actions'>" +
              (isActive
                ? "<button class='btn-sm btn-block' onclick='toggleKey(" + k.id + ",\"inactive\")'>บล็อก</button>"
                : "<button class='btn-sm btn-unblock' onclick='toggleKey(" + k.id + ",\"active\")'>ปลดบล็อก</button>") +
              "<button class='btn-sm btn-del' onclick='deleteKey(" + k.id + ")'>ลบ</button>" +
            "</div>" +
          "</div>";
      });

      document.getElementById("statTotal").textContent   = data.length;
      document.getElementById("statActive").textContent  = active;
      document.getElementById("statInactive").textContent = inactive;
      document.getElementById("keyList").innerHTML =
        data.length ? html : "<div class='empty'>ยังไม่มี Key</div>";
    })
    .catch(function() { showToast("โหลดไม่ได้ ตรวจสอบการเชื่อมต่อ"); });
}

// ── Create Key ──
function createKey() {
  var key    = document.getElementById("newKey").value.trim();
  var expiry = document.getElementById("newExpiry").value;
  var note   = document.getElementById("newNote").value.trim();
  if (!key) { showToast("⚠  กรุณาใส่ Key"); return; }

  fetch(SUPABASE_URL + "/rest/v1/keys", {
    method:  "POST",
    headers: Object.assign({}, HEADERS, { "Prefer": "return=minimal" }),
    body:    JSON.stringify({ key: key, status: "active", expiry: expiry, note: note })
  }).then(function(r) {
    if (r.ok || r.status === 201) {
      showToast("✓  สร้าง Key สำเร็จ");
      document.getElementById("newKey").value    = "";
      document.getElementById("newExpiry").value = "";
      document.getElementById("newNote").value   = "";
      loadKeys();
    } else {
      showToast("✕  เกิดข้อผิดพลาด");
    }
  }).catch(function() { showToast("✕  เชื่อมต่อไม่ได้"); });
}

// ── Toggle ──
function toggleKey(id, status) {
  fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
    method:  "PATCH",
    headers: HEADERS,
    body:    JSON.stringify({ status: status })
  }).then(function() {
    showToast(status === "active" ? "✓  ปลดบล็อกสำเร็จ" : "✓  บล็อกสำเร็จ");
    loadKeys();
  }).catch(function() { showToast("✕  เชื่อมต่อไม่ได้"); });
}

// ── Delete ──
function deleteKey(id) {
  if (!confirm("ลบ Key นี้?")) return;
  fetch(SUPABASE_URL + "/rest/v1/keys?id=eq." + id, {
    method:  "DELETE",
    headers: HEADERS
  }).then(function() {
    showToast("✓  ลบสำเร็จ");
    loadKeys();
  }).catch(function() { showToast("✕  เชื่อมต่อไม่ได้"); });
}

// ── Toast ──
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2800);
}

// ── Escape HTML ──
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
