<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้าน APK</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <!-- ส่วนล็อกอิน -->
        <div id="login-section">
            <h2>🔐 กรุณาล็อกอินด้วย Google</h2>
            <button class="google-btn" id="login-btn">
                🟢 เข้าสู่ระบบด้วย Google
            </button>
        </div>
        
        <!-- ส่วนเนื้อหาหลังล็อกอิน -->
        <div id="content-section" style="display: none;">
            <h2>✅ ยินดีต้อนรับ</h2>
            <p id="user-info"></p>
            <button class="logout-btn" id="logout-btn">ออกจากระบบ</button>
            
            <img src="images/app-icon.png" class="app-icon" alt="App Icon">
            <h3>ชื่อแอปของคุณ</h3>
            <p class="price">💰 ราคา 99 บาท</p>
            <a href="https://line.me/ti/p/~your-line-id" class="buy-button">💬 สั่งซื้อผ่าน LINE</a>
            <p class="note">📱 แจ้งชื่อแอป + แนบสลิป รับลิงก์ดาวน์โหลดทันที</p>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script src="js/config/firebase-config.js"></script>
    <script src="js/modules/auth-system.js"></script>
    <script src="js/modules/user-state.js"></script>
    <script src="js/modules/content-render.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
