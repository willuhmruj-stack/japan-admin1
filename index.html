<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้าน APK</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            color: white;
            margin-bottom: 20px;
        }
        .google-btn {
            background: white;
            color: #333;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }
        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            margin: 15px 0;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #00d4ff;
        }
        h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .price {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
            margin: 15px 0;
        }
        .buy-button {
            display: block;
            background: linear-gradient(135deg, #06C755, #00a347);
            color: white;
            padding: 18px 20px;
            font-size: 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin: 25px 0 15px;
            box-shadow: 0 8px 0 #008c3a;
        }
        .note {
            color: #aaa;
            font-size: 14px;
            margin: 15px 0;
        }
        #user-info {
            color: #00d4ff;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ส่วนล็อกอิน -->
        <div id="login-section">
            <h2>🔐 กรุณาล็อกอินด้วย Google</h2>
            <button class="google-btn" onclick="login()">
                🟢 เข้าสู่ระบบด้วย Google
            </button>
        </div>
        
        <!-- ส่วนเนื้อหาหลังล็อกอิน -->
        <div id="content-section" style="display: none;">
            <h2>✅ ยินดีต้อนรับ</h2>
            <p id="user-info"></p>
            <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
            
            <!-- เนื้อหาขาย APK -->
            <img src="images/app-icon.png" class="app-icon" alt="App Icon">
            <h3>ชื่อแอปของคุณ</h3>
            <p class="price">💰 ราคา 99 บาท</p>
            <a href="https://line.me/ti/p/~your-line-id" class="buy-button">💬 สั่งซื้อผ่าน LINE</a>
            <p class="note">📱 แจ้งชื่อแอป + แนบสลิป รับลิงก์ดาวน์โหลดทันที</p>
        </div>
    </div>

    <script>
        // Firebase Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyDUotTGRXmMNGRmVqwAZQaWPuoJLSVQzTE",
            authDomain: "godruj-cf845.firebaseapp.com",
            projectId: "godruj-cf845",
            storageBucket: "godruj-cf845.firebasestorage.app",
            messagingSenderId: "842695726741",
            appId: "1:842695726741:web:11c1de5cc7458bf4cfad9c"
        };
        
        // เริ่มต้น Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        // ฟังก์ชันล็อกอิน
        function login() {
            auth.signInWithPopup(provider);
        }
        
        // ฟังก์ชันออกจากระบบ
        function logout() {
            auth.signOut();
        }
        
        // เช็คสถานะล็อกอิน
        auth.onAuthStateChanged(user => {
            const loginSection = document.getElementById('login-section');
            const contentSection = document.getElementById('content-section');
            const userInfo = document.getElementById('user-info');
            
            if (user) {
                loginSection.style.display = 'none';
                contentSection.style.display = 'block';
                userInfo.innerHTML = `👤 ${user.displayName || 'ผู้ใช้'} (${user.email})`;
            } else {
                loginSection.style.display = 'block';
                contentSection.style.display = 'none';
            }
        });
    </script>
</body>
</html>
